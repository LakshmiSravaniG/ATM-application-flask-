<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM App</title>


    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        a {
            text-decoration: none;
        }
    </style>


</head>

<body>

    <div class="container">
        <h1>Welcome to ATM App</h1>

        <a href="{{ url_for('register') }}">
            <button class="btn">Register</button>
        </a>

        <a href="{{ url_for('login') }}">
            <button class="btn">Login</button>
        </a>
    </div>


</body>

</html>
