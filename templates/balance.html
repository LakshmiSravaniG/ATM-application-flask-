<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Balance</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            background-repeat: no-repeat;
            background-size: cover;
            height: 100vh;
            margin: 0;
        }

        label {
            font-size: 25px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        }
    </style>

</head>

<body>
    <center>
        <label>User Balance Amount: {{balance_amount}}</label>
    </center>

    {#
    {% if balance_amount>500 %}
    <p>Good</p>
    {% elif balance_amount==500 %}
    <p> medium </p>
    {% else %}
    <p>low</p>
    {% endif %}
    #}


    {% for i in users %}
    <h1> User Name : {{i}}</h1>
    <h1> User Amount : {{users[i]['Amount']}}</h1>
    {% endfor %}
</body>
